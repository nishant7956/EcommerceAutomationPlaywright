name: Manual Test Run (On-Demand)

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test Filter (e.g., TestCategory=Smoke, or Name=Can_Create_New_Product)'
        required: false
        default: ''
      repeat_count:
        description: 'Number of times to run the test (e.g., to check for flakiness)'
        required: true
        default: '1'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      checks: write
      contents: write

    steps:
    # 1. Get the Playwright Tests Code (Root)
    - name: Checkout Playwright Tests Code
      uses: actions/checkout@v4

    # 2. Get the Web App Code
    - name: Checkout Web App Code
      uses: actions/checkout@v4
      with:
        repository: nishant7956/EcommerceWebApp
        path: 'webapp'

    # 3. Build & Run the Web App
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build and Start Web App
      run: |
        dotnet build
        dotnet run --no-build &
        timeout 30 bash -c 'until curl -s http://localhost:5130/ > /dev/null; do sleep 1; done'
      working-directory: ./webapp

    # 4. Install Playwright and Run
    - name: Build Playwright Tests
      run: dotnet build ECommerce.Playwright.slnx

    - name: Install Playwright Browsers
      run: pwsh ECommerce.Playwright.Tests/bin/Debug/net8.0/playwright.ps1 install --with-deps

    - name: Run Playwright Tests (Filtered & Repeated)
      run: |
        for i in $(seq 1 ${{ github.event.inputs.repeat_count }}); do
          echo "=================================="
          echo "   Running Test Iteration $i   "
          echo "=================================="
          
          if [ -z "${{ github.event.inputs.test_filter }}" ]; then
            dotnet test ECommerce.Playwright.slnx --logger:"trx" --results-directory ./TestResults
          else
            dotnet test ECommerce.Playwright.slnx --filter "${{ github.event.inputs.test_filter }}" --logger:"trx" --results-directory ./TestResults
          fi
        done
      env:
        DOTNET_ENVIRONMENT: CI

    # 5. Upload Results
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ./TestResults/

    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: ./TestResults/allure-results
        gh_pages: gh-pages
        allure_report: allure-report
        allure_history: allure-history

    - name: Deploy Allure Report to Github Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
